# Conda environment for path2space-companion.
# Pinned to match the `vision_ml` env used for the published predictions.
#
# Critical pins:
#   spams-bin 2.6.13         -- stain-matrix output is version-sensitive
#   opencv 4.12 / numpy 2.2  -- Sobel/np.unique behavior must match
#   pillow 12.1              -- BICUBIC resize numerics
#   torch 2.6 + cu124        -- numerical stability for the 154-MLP ensemble
#
# Usage:
#   conda env create -f environment.yml
#   conda activate path2space-companion
#   pip install -e .

name: path2space-companion
channels:
  - conda-forge

dependencies:
  - python=3.10.14
  - pip
  - numpy=2.2.6
  - opencv=4.12.0
  - scipy=1.15.2
  - scikit-image=0.25.2
  - pandas=2.3.3
  - openslide=4.0.0
  - openslide-python=1.4.2
  - timm=1.0.20
  - statsmodels=0.14.5
  - tqdm=4.67.1
  - matplotlib=3.9.1
  - pip:
      - pillow==12.1.1
      - spams-bin==2.6.13
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch==2.6.0+cu124
      - torchvision==0.21.0+cu124
