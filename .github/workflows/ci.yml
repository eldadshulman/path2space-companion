name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Discovers every top-level subfolder that contains a `tests/` directory and
# runs its smoke tests. Add a new component as a sibling folder with
# `tests/` and it picks up automatically — no edit to this workflow needed.

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.scan.outputs.components }}
    steps:
      - uses: actions/checkout@v4
      - id: scan
        name: Find components with tests/
        run: |
          set -euo pipefail
          # JSON array of every top-level dir that has a tests/ subdir,
          # skipping dot-dirs (e.g. .github).
          components=$(find . -mindepth 2 -maxdepth 2 -type d -name tests \
                       -not -path './.*' \
                       | sed -E 's|^\./([^/]+)/tests$|\1|' \
                       | sort -u \
                       | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "components=$components" >> "$GITHUB_OUTPUT"
          echo "Discovered components: $components"

  test:
    needs: discover
    if: ${{ needs.discover.outputs.components != '[]' && needs.discover.outputs.components != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.discover.outputs.components) }}
    defaults:
      run:
        working-directory: ./${{ matrix.component }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: "**/requirements-ci.txt"

      - name: Install component (smoke-test subset)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-ci.txt ]; then
            pip install -r requirements-ci.txt
          fi
          # Register the package without re-installing the (heavy) deps from
          # setup.py — those are pinned in environment.yml for the full
          # pipeline but unnecessary for smoke tests.
          if [ -f setup.py ] || [ -f pyproject.toml ]; then
            pip install -e . --no-deps
          fi

      - name: Run smoke tests
        run: pytest tests/ -v
